<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>user_bookings</title>
</head>
<body>
    <div class="container">
        <div class="row">
            {% for i in bookings %}
            <div class="col-lg-12">
                <img src="{{i.details.product.img.url}}" style="height: 300px; width:300px;" alt="">
                <p>{{i.details.product.name}}</p>
                <p>Total Price : {{i.t_price}}</p>
                <p>quantity : {{i.quantity}}</p>
            </div>
            {% endfor %}
        </div>
    </div>
    <div class=" mt-4" style="text-align: right;margin-right: 200px;">
        <a href="../view_cart" class="btn btn-danger">Go back</a>
    </div>
</body>
</html>
