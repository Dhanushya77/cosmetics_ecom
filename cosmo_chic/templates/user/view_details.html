<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- {% load static %}
    <link rel="stylesheet" href="{% static 'ecom-style2.css' %}"> -->
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="d-flex">
    <div class="container" style="text-align: center;">
        <img src="{{details.product.img.url}}" alt="image" style="width: 350px;" height="350px"><br><br>
        <h5 class="card-title fw-bold">{{details.product.name}}</h5>
        <p class="card-text text-muted">{{details.product.dis}}</p>
        <p class="card-text text-muted">weight: {{details.weight}}</p>
        <p style="color: black;" class="card-text text-muted">₹{{details.offer_price}} <span style="text-decoration: line-through;">₹{{details.price}}</span></p>
        <div class="d-flex justify-content-center gap-3" style="margin-top: 6vh;">
            <a href="../add_to_cart/{{details.product.id}}" class="btn btn-outline-primary btn-sm">
                <i class="fas fa-cart-plus"></i> Add to cart
            </a>
            <a href="../buy_pro/{{details.product.id}}" class="btn btn-outline-danger btn-sm">
                <i class="fas fa-credit-card"></i> Buy now
            </a>
        </div>
    </div>
    </div>
</body>

</html>
