<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> 
</head>
<body>
    <nav class="navbar navbar-expand-sm  navbar-dark" style="background-color: rgba(179, 55, 76, 0.507);">
        <div class="container-fluid">
          <a class="navbar-brand text-light"  href="#">Cosmo Chic</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="collapsibleNavbar">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link text-light" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="add_pro">Add product</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="logout">Logout</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <div class="container mt-5">
        <div class="row">
          {% for pro in product %}
            <div class="card" style="width:300px">
              <img class="card-img-top" src="{{pro.img.url}}" alt="Card image" style="width:100%" height="250px">
              <div class="card-body">
                <h4 class="card-title">{{pro.name}}</h4>
                <p class="card-text">{{pro.dis}}</p>
                <a href="edit_pro/{{pro.pk}}" class="btn btn-primary">Edit</a>
                <a href="delete_pro/{{pro.pk}}" class="btn btn-primary">Delete</a>
              </div>
            </div>
            {% endfor %}
          
        </div>

</body>
</html>
